    <symbol id="i-back" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></symbol>

    <symbol id="i-heart" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/></symbol>

<article class="post-page">

  <div class="post-body container narrow">
    <span id="post-date" class="post-date"></span>
    <h1 id="post-title" class="serif">…</h1>

    <div id="post-gallery" class="post-gallery"></div>

    <div class="post-cta">
      <a href="https://wa.me/5562962267380" target="_blank" class="btn primary"><svg class="ic"><use href="#i-zap"/></svg> Falar com a Joana</a>
      <button class="btn ghost" id="btn-share"><svg class="ic"><use href="#i-share"/></svg> Compartilhar</button>
    </div>
  </div>
</article>

<footer class="foot">
  <p data-cb-tpl>© 2026 Elegance Fitwear · {{global.address_line}}</p>
</footer>

<script>window.BF_BRAND = 'elegance';</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase-config.js"></script>
<script src="../bf-supabase.js"></script>
<script>
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function paragraphs(s){return escapeHtml(s).split(/\n{2,}/).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('')}

(async () => {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { document.getElementById('post-title').textContent = 'Post não encontrado'; return; }
  try {
    const p = await window.bfLoadPost(id);
    if (!p) throw 0;
    const title = p.title + ' — Elegance Fitwear';
    document.getElementById('page-title').textContent = title;
    document.getElementById('post-title').textContent = p.title;
    document.getElementById('post-excerpt').textContent = p.excerpt || '';
    document.getElementById('post-date').textContent = new Date(p.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
    if (p.cover_url) document.getElementById('post-cover').style.backgroundImage = `url('${p.cover_url}')`;
    else document.getElementById('post-cover').style.display = 'none';
    document.getElementById('post-content').innerHTML = paragraphs(p.body || '');
    const media = (p.media || []);
    document.getElementById('post-gallery').innerHTML = media.map(m =>
      m.type === 'video'
        ? `<video controls preload="metadata" src="${m.url}"></video>`
        : `<img src="${m.url}" loading="lazy">`
    ).join('');
    window.bfSetMeta({
      title,
      description: p.excerpt || (p.body || '').slice(0, 160),
      image: p.cover_url || (media[0] && media[0].type === 'image' ? media[0].url : null),
      url: location.href
    });
    window.bfBumpView(id);

    document.getElementById('btn-share').onclick = async () => {
      const data = { title, text: p.excerpt || '', url: location.href };
      if (navigator.share) try { await navigator.share(data); return; } catch {}
      navigator.clipboard.writeText(location.href);
      const b = document.getElementById('btn-share');
      const old = b.innerHTML;
      b.innerHTML = '✓ Link copiado';
      setTimeout(()=>{ b.innerHTML = old; }, 2200);
    };
  } catch {
    document.getElementById('post-title').textContent = 'Post não encontrado';
  }
})();
</script>
</body>
</html>
